# Nginx configuration for Forts Tracker App
# For Oracle Always Free Server deployment

# Upstream backend API
upstream backend {
  server localhost:5000;
  keepalive 64;
}

# HTTP redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name forts.ajinkya.codes forts.application.api.ajinkya.codes;
  return 301 https://$server_name$request_uri;
}

# HTTPS server for main application domain
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name forts.ajinkya.codes;

  ssl_certificate /etc/letsencrypt/live/forts.ajinkya.codes/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/forts.ajinkya.codes/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Root directory for frontend (React build)
  root /var/www/forts-tracker/frontend/dist;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json;
  gzip_min_length 1000;

  # Frontend static files (SPA)
  location / {
    try_files $uri $uri/ /index.html;
    expires 1d;
    add_header Cache-Control "public, immutable";
  }

  # Static assets with long cache
  location ~* ^/(assets|public)/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # API proxy to backend
  location /api/ {
    proxy_pass http://backend/;
    proxy_http_version 1.1;
    
    # Proxy headers
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Backend routes (without /api prefix)
  location ~ ^/(auth|forts)/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
  }

  location ~ ~$ {
    deny all;
  }
}
